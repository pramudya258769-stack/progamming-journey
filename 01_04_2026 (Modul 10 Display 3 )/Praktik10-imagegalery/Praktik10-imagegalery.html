<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        div.gallery-item {
            margin: 30px;
            border: 1 px solid #ccc;
            width: 180px;
        }
        div.gallery-item:hover{
            border: 1px solid #777;
        }
        div.gallery-item img {
            width: 200px;
            height: 200px;
        }
        div.gallery-item div.desc{
            padding: 15px;
            text-align: center;
        } 
    </style>
</head>
<body>
    <h2>Image Gallery</h2>

    <div class="gallery">

        <div class="gallery-item">

            <a target="_blank" href="Itali.jpeg">
                <img src="Itali.jpeg" alt="Cinque Terre" width="600" height="400">
            </a>
            <div class="desc">Cinque Terre</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="forest.jpeg">
                <img src="forest.jpeg" alt="Green Forest" width="600" height="400">
            </a>
        <div class="desc">Green Forest</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="Northern Lights.jpeg"> 
                <img src="Northern Lights.jpeg" alt="Northern Lights" width="600" height="400">
            </a>
        <div class="desc">Northern Lights</div>
        </div>

        <div class="gallery-item">
            <a target="_blank" href="Mountains.jpeg">
                <img src="Mountains.jpeg" alt="Mountains" width="600" height="400">
            </a>
        <div class="desc">Mountains</div>
        </div>
    </div>
</body>
</html>
