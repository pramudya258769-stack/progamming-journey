<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik-12-relativeposition</title>
<style>
        div{
            width: 200px;
            height: 200PX;
        }
        .satu{
            background-color: pink;
        }
        .dua{
            background-color: peachpuff;
            position: relative;
            top: 10px;
            left: 10px;
        }
        .tiga{
            background-color: plum;
        }
    </style>
</head>
<body>
    <div class="satu"></div>
    <div class="dua"></div>
    <div class="tiga"></div>
</body>
</html>
