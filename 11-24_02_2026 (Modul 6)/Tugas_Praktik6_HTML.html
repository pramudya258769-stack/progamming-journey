<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas_Praktik6_HTML</title>
    <style>
        .solid {
            border: 3px solid blue;
            padding: 10px;
            background-color: aqua;
        }
        .dotted {
            border: 3px dotted red;
            padding: 10px;
            background-color: beige;
        }
        .double {
            border: 5px double green;
            padding: 10px;
            background-color: bisque;
        }
        .dashed {
            border: 5px dashed yellow;
            padding: 10px;
            background-color: brown;
        }
        .groove {
            border: 5px groove orange;
            padding: 10px;
            background-color: red;
        }
        .ridge {
            border: 5px ridge black;
            padding: 10px;
            background-color: silver;
        }
    </style>
</head>
<body>
    
    <h1>Contoh Border CSS</h1>

    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed</p>
    <p class="groove">Ini border groove</p>
    <p class="ridge">Ini border ridge</p>
</body>
</html>
